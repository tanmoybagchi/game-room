<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Room</title>
  <link rel="icon" href="favicon.svg">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/shared.css">
  <script type="module" src="js/components/game-card.js"></script>
  <script data-sw="sw.js" src="js/shared/sw-update.js"></script>
  <style>
    .dashboard {
      padding: 2rem 0;
    }

    .dashboard h2 {
      font-size: clamp(1rem, 2vw, 1.2rem);
      color: var(--text-secondary);
      font-weight: 500;
      margin-bottom: 1.25rem;
    }

    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 1rem;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <h1>🎲 Game Room</h1>
  </header>

  <main class="container dashboard">
    <div class="games-grid">
      <game-card
        name="2048"
        description="Slide and merge to 2048"
        href="games/2048/"
        icon="⬆️"
      ></game-card>
      <game-card
        name="FreeCell"
        description="Strategic card sorting"
        href="games/freecell/"
        icon='<span class="suit-black">♠</span><span class="suit-red">♥</span>'
      ></game-card>
      <game-card
        name="Hangman"
        description="Guess before time runs out"
        href="games/hangman/"
        icon="☠️"
      ></game-card>
      <game-card
        name="Klondike Solitaire"
        description="The classic card game"
        href="games/klondike-solitaire/"
        icon="🃏"
      ></game-card>
      <game-card
        name="Memory"
        description="Flip pairs to match"
        href="games/memory/"
        icon="🧠"
      ></game-card>
      <game-card
        name="Minesweeper"
        description="Reveal cells, avoid mines"
        href="games/minesweeper/"
        icon="💣"
      ></game-card>
      <game-card
        name="Pyramid"
        description="Pair cards that sum to 13"
        href="games/pyramid/"
        icon="🔺"
      ></game-card>
      <game-card
        name="Spelling Bee"
        description="Make words from 7 letters"
        href="games/spelling-bee/"
        icon="🐝"
      ></game-card>
      <game-card
        name="Spider Solitaire"
        description="Stack eight full suits"
        href="games/spider-solitaire/"
        icon='<img src="images/spider.svg" alt="">'
      ></game-card>
      <game-card
        name="Sudoku"
        description="Fill the grid with 1–9"
        href="games/sudoku/"
        icon="🔢"
      ></game-card>
      <game-card
        name="TriPeaks"
        description="Clear three peaks ±1 at a time"
        href="games/tripeaks/"
        icon="🗻"
      ></game-card>
      <game-card
        name="Word Search"
        description="Find hidden words in a grid"
        href="games/word-search/"
        icon="🔍"
      ></game-card>
      <game-card
        name="Wordle"
        description="Guess the 5-letter word"
        href="games/wordle/"
        icon="🔤"
      ></game-card>
      <game-card
        name="Yukon"
        description="Move any face-up card"
        href="games/yukon/"
        icon="❄️"
      ></game-card>
    </div>
  </main>

  <footer class="site-footer">v1.7.0</footer>
</body>
</html>
