<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Memory — Game Room</title>
  <link rel="icon" href="../../favicon.svg">
  <link rel="manifest" href="../../manifest.json">
  <script data-sw="../../sw.js" src="../../js/shared/sw-update.js"></script>
  <link rel="stylesheet" href="../../css/shared.css">
  <link rel="stylesheet" href="../../css/game-shared.css">
  <link rel="stylesheet" href="memory.css">
  <script src="../../js/shared/wake-lock.js"></script>
</head>
<body>
  <header class="site-header">
    <h1>🧠 Memory</h1>
    <div class="header-controls">
      <button class="btn" id="btn-new-game">🔄 <span class="btn-label">New Game</span></button>
      <button class="btn" id="btn-help" aria-label="How to play">ℹ</button>
      <a href="../../" class="btn" aria-label="Home">🏠</a>
    </div>
  </header>

  <dialog id="help-modal" class="help-modal">
    <div class="help-modal-content">
      <div class="help-modal-header">
        <h2>How to Play</h2>
        <button class="btn help-close" id="btn-help-close" aria-label="Close">&times;</button>
      </div>
      <p><strong>Goal:</strong> Find all matching pairs by flipping two cards at a time.</p>
      <dl>
        <dt>Flip</dt>
        <dd>Tap a card to reveal it. Then tap a second card.</dd>
        <dt>Match</dt>
        <dd>If both cards show the same symbol, they stay face-up.</dd>
        <dt>No Match</dt>
        <dd>If they differ, both flip back after a short delay.</dd>
      </dl>
    </div>
  </dialog>

  <main class="container game-area">
    <div id="board" class="board"></div>
  </main>

  <div id="win-overlay" class="win-overlay" hidden>
    <div class="win-content">
      <h2>🎉 You Win!</h2>
      <button class="btn win-btn" id="btn-play-again">Play Again</button>
    </div>
  </div>

  <script type="module" src="memory.js"></script>
</body>
</html>
